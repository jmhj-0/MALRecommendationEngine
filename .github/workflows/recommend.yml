name: Weekly Recommendations

on:
  schedule:
    # Monday 10:00 BST (09:00 UTC). In winter (GMT) this fires at 09:00 local.
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  recommend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate recommendations
        env:
          MAL_CLIENT_ID: ${{ secrets.MAL_CLIENT_ID }}
          MAL_USERNAME: ${{ secrets.MAL_USERNAME }}
        run: python -m src.main > recommendations.txt 2>&1

      - name: Commit recommendation history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          git diff --cached --quiet || git commit -m "Update recommendation history" && git push

      - name: Create GitHub issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          {
            echo '```'
            cat recommendations.txt
            echo '```'
          } > issue_body.md
          gh issue create \
            --title "MAL Weekly Recommendations - $DATE" \
            --body-file issue_body.md

      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Workflow failure - $(date -u +%Y-%m-%d)" \
            --body "The Weekly Recommendations workflow failed. [View run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
